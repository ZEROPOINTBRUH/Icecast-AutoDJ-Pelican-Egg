<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - AutoDJ Extreme</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 32px;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .stat-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .stat-box-icon {
            font-size: 32px;
        }

        .stat-box-trend {
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .stat-box-trend.up {
            background: rgba(29, 185, 84, 0.2);
            color: var(--accent-primary);
        }

        .stat-box-trend.down {
            background: rgba(248, 48, 98, 0.2);
            color: var(--accent-pink);
        }

        .stat-box-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-box-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chart-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-container h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .top-tracks-list {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
        }

        .track-rank-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .rank-number {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 8px;
            font-weight: 700;
            font-size: 18px;
        }

        .track-rank-info {
            flex: 1;
        }

        .track-rank-info strong {
            display: block;
            margin-bottom: 4px;
        }

        .track-rank-info small {
            color: var(--text-secondary);
        }

        .play-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
        }
    </style>
</head>
<body style="background: var(--bg-primary); color: var(--text-primary); padding: 20px;">
    <div class="analytics-container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--bg-secondary); border-radius: 8px; color: var(--text-primary); text-decoration: none; font-weight: 600; margin-bottom: 24px;">
            ← Back to Dashboard
        </a>

        <h1 style="font-size: 36px; margin: 24px 0 12px;">📊 Analytics Dashboard</h1>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">Real-time audience insights and performance metrics</p>

        <div class="stats-overview">
            <div class="stat-box">
                <div class="stat-box-header">
                    <span class="stat-box-icon">👥</span>
                    <span class="stat-box-trend up">↑ 12%</span>
                </div>
                <div class="stat-box-value" id="totalListeners">0</div>
                <div class="stat-box-label">Total Listeners Today</div>
            </div>

            <div class="stat-box">
                <div class="stat-box-header">
                    <span class="stat-box-icon">🔥</span>
                    <span class="stat-box-trend up">↑ 8%</span>
                </div>
                <div class="stat-box-value" id="peakListeners">0</div>
                <div class="stat-box-label">Peak Concurrent</div>
            </div>

            <div class="stat-box">
                <div class="stat-box-header">
                    <span class="stat-box-icon">⏱️</span>
                    <span class="stat-box-trend up">↑ 5%</span>
                </div>
                <div class="stat-box-value" id="avgListenTime">0m</div>
                <div class="stat-box-label">Avg. Listen Time</div>
            </div>

            <div class="stat-box">
                <div class="stat-box-header">
                    <span class="stat-box-icon">🎵</span>
                    <span class="stat-box-trend up">↑ 15%</span>
                </div>
                <div class="stat-box-value" id="tracksPlayed">0</div>
                <div class="stat-box-label">Tracks Played</div>
            </div>
        </div>

        <div class="chart-container">
            <h3>📈 Listener Trends (Last 7 Days)</h3>
            <canvas id="listenerChart"></canvas>
        </div>

        <div class="chart-container">
            <h3>🕐 Peak Listening Hours</h3>
            <canvas id="hourlyChart"></canvas>
        </div>

        <div class="top-tracks-list">
            <h3 style="margin-bottom: 20px;">🎵 Top 10 Most Played Tracks</h3>
            <div id="topTracksList"></div>
        </div>
    </div>

    <script>
        // Initialize charts
        const listenerChartCtx = document.getElementById('listenerChart').getContext('2d');
        const hourlyChartCtx = document.getElementById('hourlyChart').getContext('2d');

        // Listener trends chart
        const listenerChart = new Chart(listenerChartCtx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Listeners',
                    data: [45, 52, 61, 58, 72, 85, 78],
                    borderColor: '#1db954',
                    backgroundColor: 'rgba(29, 185, 84, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#2a2a2a' },
                        ticks: { color: '#b3b3b3' }
                    },
                    x: {
                        grid: { color: '#2a2a2a' },
                        ticks: { color: '#b3b3b3' }
                    }
                }
            }
        });

        // Hourly chart
        const hourlyChart = new Chart(hourlyChartCtx, {
            type: 'bar',
            data: {
                labels: ['12am', '3am', '6am', '9am', '12pm', '3pm', '6pm', '9pm'],
                datasets: [{
                    label: 'Listeners',
                    data: [12, 8, 15, 35, 48, 62, 75, 58],
                    backgroundColor: 'rgba(102, 126, 234, 0.8)',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#2a2a2a' },
                        ticks: { color: '#b3b3b3' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#b3b3b3' }
                    }
                }
            }
        });

        // Top tracks
        const topTracks = [
            { rank: 1, name: 'Summer Vibes', artist: 'Cool Artist', plays: 256 },
            { rank: 2, name: 'Night Drive', artist: 'Electronic Dreams', plays: 218 },
            { rank: 3, name: 'Chill Beats', artist: 'Lo-Fi Master', plays: 195 },
            { rank: 4, name: 'Rock Anthem', artist: 'The Rockers', plays: 178 },
            { rank: 5, name: 'Jazz Night', artist: 'Smooth Jazz Trio', plays: 167 },
            { rank: 6, name: 'Pop Star', artist: 'Chart Topper', plays: 152 },
            { rank: 7, name: 'EDM Banger', artist: 'Festival King', plays: 145 },
            { rank: 8, name: 'Acoustic Dreams', artist: 'Indie Folk', plays: 132 },
            { rank: 9, name: 'Hip Hop Flow', artist: 'Rap Master', plays: 128 },
            { rank: 10, name: 'Classical Mood', artist: 'Orchestra', plays: 115 }
        ];

        const topTracksList = document.getElementById('topTracksList');
        topTracksList.innerHTML = topTracks.map(track => `
            <div class="track-rank-item">
                <div class="rank-number">${track.rank}</div>
                <div class="track-rank-info">
                    <strong>${track.name}</strong>
                    <small>${track.artist}</small>
                </div>
                <div class="play-count">${track.plays}</div>
            </div>
        `).join('');

        // Update stats
        document.getElementById('totalListeners').textContent = '1,247';
        document.getElementById('peakListeners').textContent = '85';
        document.getElementById('avgListenTime').textContent = '23m';
        document.getElementById('tracksPlayed').textContent = '342';

        // Real-time updates every 30 seconds
        setInterval(() => {
            // Fetch real analytics from API
            // fetch('/api/analytics').then(...)
        }, 30000);
    </script>
</body>
</html>
