<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Manager - AutoDJ Extreme</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .upload-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 32px;
        }

        .drop-zone {
            border: 3px dashed var(--border-color);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            background: var(--bg-secondary);
            transition: all 0.3s;
            margin-bottom: 32px;
            cursor: pointer;
        }

        .drop-zone.dragover {
            border-color: var(--accent-primary);
            background: var(--bg-tertiary);
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .drop-zone-text {
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .drop-zone-hint {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-list {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
        }

        .upload-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .upload-item-icon {
            font-size: 32px;
        }

        .upload-item-info {
            flex: 1;
        }

        .upload-item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-item-size {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-progress {
            width: 100%;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-pink));
            transition: width 0.3s;
        }

        .upload-status {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .upload-status.uploading {
            background: rgba(29, 185, 84, 0.2);
            color: var(--accent-primary);
        }

        .upload-status.complete {
            background: rgba(29, 185, 84, 0.3);
            color: var(--accent-primary);
        }

        .upload-status.error {
            background: rgba(248, 48, 98, 0.2);
            color: var(--accent-pink);
        }

        .category-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .category-btn {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .category-btn:hover {
            border-color: var(--accent-primary);
        }

        .category-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            transform: translateX(-4px);
        }
    </style>
</head>
<body style="background: var(--bg-primary); color: var(--text-primary); padding: 20px;">
    <div class="upload-container">
        <a href="index.html" class="back-btn">
            ← Back to Dashboard
        </a>

        <h1 style="font-size: 36px; margin-bottom: 12px;">📁 File Upload Manager</h1>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">Upload music, ads, jingles, or station IDs</p>

        <div class="category-selector">
            <button class="category-btn active" data-category="music">🎵 Music</button>
            <button class="category-btn" data-category="ads">📢 Ads</button>
            <button class="category-btn" data-category="jingles">🎙️ Jingles</button>
            <button class="category-btn" data-category="station_ids">📻 Station IDs</button>
        </div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">☁️</div>
            <div class="drop-zone-text">Drop files here or click to browse</div>
            <div class="drop-zone-hint">Supports: MP3, M4A, OGG, FLAC, OPUS, WAV (Max 100MB per file)</div>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display: none;">
        </div>

        <div class="upload-list" id="uploadList" style="display: none;">
            <h3 style="margin-bottom: 16px;">Upload Queue</h3>
            <div id="uploadItems"></div>
        </div>
    </div>

    <script>
        let currentCategory = 'music';
        const uploads = [];

        // Category selection
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
            });
        });

        // Drop zone
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            document.getElementById('uploadList').style.display = 'block';
            
            Array.from(files).forEach(file => {
                if (file.size > 100 * 1024 * 1024) {
                    alert(`${file.name} is too large (max 100MB)`);
                    return;
                }

                const upload = {
                    id: Date.now() + Math.random(),
                    file: file,
                    category: currentCategory,
                    progress: 0,
                    status: 'pending'
                };

                uploads.push(upload);
                addUploadItem(upload);
                startUpload(upload);
            });
        }

        function addUploadItem(upload) {
            const container = document.getElementById('uploadItems');
            const item = document.createElement('div');
            item.className = 'upload-item';
            item.id = `upload-${upload.id}`;
            
            const icon = upload.file.type.includes('audio') ? '🎵' : '📁';
            const size = formatFileSize(upload.file.size);

            item.innerHTML = `
                <div class="upload-item-icon">${icon}</div>
                <div class="upload-item-info">
                    <div class="upload-item-name">${upload.file.name}</div>
                    <div class="upload-item-size">${size} • ${upload.category}</div>
                    <div class="upload-progress">
                        <div class="upload-progress-bar" id="progress-${upload.id}" style="width: 0%"></div>
                    </div>
                </div>
                <div class="upload-status uploading" id="status-${upload.id}">Uploading...</div>
            `;

            container.appendChild(item);
        }

        function startUpload(upload) {
            // Simulate upload (replace with actual upload logic)
            const formData = new FormData();
            formData.append('file', upload.file);
            formData.append('category', upload.category);

            // For demo: simulate progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    updateUploadStatus(upload.id, 'complete', 'Complete ✓');
                }
                updateUploadProgress(upload.id, progress);
            }, 200);

            // Actual upload would be:
            /*
            fetch(`/api/upload/${upload.category}`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                updateUploadStatus(upload.id, 'complete', 'Complete ✓');
            })
            .catch(error => {
                updateUploadStatus(upload.id, 'error', 'Failed ✗');
            });
            */
        }

        function updateUploadProgress(id, progress) {
            const bar = document.getElementById(`progress-${id}`);
            if (bar) bar.style.width = `${progress}%`;
        }

        function updateUploadStatus(id, status, text) {
            const statusEl = document.getElementById(`status-${id}`);
            if (statusEl) {
                statusEl.className = `upload-status ${status}`;
                statusEl.textContent = text;
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
    </script>
</body>
</html>
