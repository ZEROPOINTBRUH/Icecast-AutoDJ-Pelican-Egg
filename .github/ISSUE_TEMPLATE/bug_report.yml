name: 🐛 Bug Report
description: Report a bug or issue with AutoDJ-Extreme
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!
        Please fill out the form below to help us understand and fix the issue.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation
          required: true
        - label: I am using the latest version
          required: false

  - type: dropdown
    id: version
    attributes:
      label: Which version are you using?
      options:
        - Extreme Edition (radio-extreme.json)
        - Enhanced Edition (radio-improved.json)
        - Original Edition (radio.json)
    validations:
      required: true

  - type: dropdown
    id: panel
    attributes:
      label: Panel Type
      options:
        - Pterodactyl Panel
        - Pelican Panel
        - Docker (standalone)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Please provide environment information
      placeholder: |
        - OS: Ubuntu 22.04
        - RAM: 2GB
        - CPU: 2 cores
        - Listeners: 50
        - Features enabled: Ads, Jingles, Multi-playlist
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Please paste relevant logs from `/log/` directory
      placeholder: |
        Paste logs here (from autodj.log, autodj-error.log, etc.)
      render: shell
    validations:
      required: false

  - type: textarea
    id: configuration
    attributes:
      label: Environment Variables
      description: List relevant environment variable settings (REMOVE PASSWORDS!)
      placeholder: |
        ENABLE_ADS=true
        ENABLE_JINGLES=true
        MAX_CLIENTS=100
        (DO NOT include passwords!)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help
      placeholder: Screenshots, workarounds, related issues...
    validations:
      required: false

  - type: checkboxes
    id: areas
    attributes:
      label: Affected Areas
      description: Which areas are affected? (select all that apply)
      options:
        - label: Installation/Setup
        - label: Music playback
        - label: Ads rotation
        - label: Jingles injection
        - label: Multi-playlist
        - label: Web interface
        - label: Admin panel
        - label: Logging
        - label: Process monitoring
        - label: Configuration
