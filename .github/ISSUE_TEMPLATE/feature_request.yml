name: ✨ Feature Request
description: Suggest a new feature or enhancement for AutoDJ-Extreme
title: "[Feature]: "
labels: ["enhancement", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for suggesting a feature!
        Help us understand your idea by filling out the details below.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and this feature hasn't been requested
          required: true
        - label: I have checked the documentation to see if this feature exists
          required: true
        - label: This feature would benefit multiple users, not just myself
          required: false

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Playback & Streaming
        - Multi-Playlist System
        - Ads & Monetization
        - Jingles & Branding
        - Web Interface
        - Admin Panel
        - Configuration
        - Performance
        - Security
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: Brief description of the feature (1-2 sentences)
      placeholder: What do you want to add?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: |
        I'm frustrated when...
        It would be helpful if...
        Current limitation is...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
      placeholder: |
        Describe your ideal solution...
        How should it behave?
        What should the user experience be?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Other approaches you've thought about...
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Example
      description: Provide a real-world example of how you'd use this feature
      placeholder: |
        Example scenario:
        1. User wants to...
        2. They would...
        3. Result would be...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to you?
      options:
        - Critical - Blocking my use of the software
        - High - Would significantly improve my workflow
        - Medium - Nice to have
        - Low - Minor improvement
    validations:
      required: true

  - type: checkboxes
    id: implementation
    attributes:
      label: Implementation Details
      description: Technical considerations (if applicable)
      options:
        - label: I can help implement this feature
        - label: This might require breaking changes
        - label: This affects the egg configuration
        - label: This affects the Docker image
        - label: This affects the web interface
        - label: This requires new dependencies

  - type: textarea
    id: mockup
    attributes:
      label: Mockups / Visual References
      description: Include screenshots, drawings, or links to similar implementations
      placeholder: Drag images here or paste links...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that would help us understand your request
      placeholder: Links, references, related features...
    validations:
      required: false
