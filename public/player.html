<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AutoDJ-Extreme — Player</title>
    <style>body{font-family:Inter,system-ui,Arial;background:#060817;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}.card{padding:20px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);width:480px;text-align:center}button{background:#1db954;border:0;padding:10px 14px;border-radius:8px;color:#041018;cursor:pointer}</style>
  </head>
  <body>
    <div class="card">
      <h1>AutoDJ-Extreme</h1>
      <p id="now">Loading status…</p>
      <audio id="player" controls style="width:100%"></audio>
      <div style="margin-top:12px"><button id="open-stream">Open Stream</button></div>
    </div>
    <script>
      async function load(){
        try{
          const res = await fetch('/api/status/json');
          const j = await res.json();
          document.getElementById('now').textContent = JSON.stringify(j, null, 2).slice(0,300);
        }catch(e){document.getElementById('now').textContent = String(e)}
      }
      load();
      document.getElementById('open-stream').addEventListener('click', ()=>{
        // Use autodj host/port from server location: construct stream url assuming /autodj mount
        const url = `${location.protocol}//${location.hostname}:${location.port.replace('','')||location.hostname}/autodj`;
        const player = document.getElementById('player');
        player.src = `/stream`;
        player.play().catch(()=>window.open(url));
      });
    </script>
  </body>
</html>
