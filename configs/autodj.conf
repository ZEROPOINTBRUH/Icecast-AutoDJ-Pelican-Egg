##############################################################################
# AutoDJ-Extreme Simple Configuration
# Easy-to-edit settings for non-technical users
##############################################################################

# STATION INFORMATION
STATION_NAME="AutoDJ Extreme Radio"
STATION_DESCRIPTION="Professional AutoDJ Radio Station"
STATION_GENRE="Various"
STATION_URL="http://localhost:8000"

# ICECAST SERVER SETTINGS
ICECAST_PORT=8000
ICECAST_SOURCE_PASSWORD="autodjpassword"
ICECAST_ADMIN_PASSWORD="adminpassword"
ICECAST_RELAY_PASSWORD="relaypassword"

# STREAM SETTINGS
# Maximum number of listeners
MAX_LISTENERS=100
# Maximum number of streaming sources
MAX_SOURCES=2

# AUTODJ FEATURES
# Enable/disable ads (true/false)
ENABLE_ADS=true
# Play ad every X songs
ADS_FREQUENCY=5

# Enable/disable jingles (true/false)
ENABLE_JINGLES=true
# Play jingle every X songs
JINGLE_FREQUENCY=3

# Enable time-based playlists (true/false)
# If enabled, different playlists play at different times
USE_SCHEDULED_PLAYLISTS=false

# AUDIO QUALITY SETTINGS
# Enable professional audio processing (EQ, compression, etc.)
ENABLE_AUDIO_PROCESSING=true

# Enable crossfading between tracks (true/false)
ENABLE_CROSSFADE=true
# Crossfade duration in seconds
CROSSFADE_DURATION=4

# Normalize volume levels (recommended: true)
ENABLE_NORMALIZATION=true
# Target loudness in LUFS (recommended: -14)
NORMALIZATION_TARGET=-14

# RECORDING SETTINGS
# Record stream to files (true/false)
ENABLE_RECORDING=false
# Recording quality (128, 192, 256, 320)
RECORDING_BITRATE=192

# LIVE DJ SETTINGS
# Enable live DJ input (requires additional port)
ENABLE_LIVE_INPUT=false
# Live input port (default: 8001)
LIVE_INPUT_PORT=8001
# Live DJ password
LIVE_PASSWORD="livepassword"

# ADVANCED SETTINGS (leave default unless you know what you're doing)
# Log level (1=quiet, 2=normal, 3=verbose, 4=debug)
LOG_LEVEL=3
# Request queue enabled
ENABLE_REQUESTS=true
# Telnet control port
TELNET_PORT=1234

##############################################################################
# NOTES FOR BEGINNERS
##############################################################################
# 
# 1. Upload your music files to the /music folder
# 2. (Optional) Upload ads to the /ads folder
# 3. (Optional) Upload jingles to the /jingles folder
# 4. Adjust settings above to your preference
# 5. Restart the server to apply changes
#
# STREAM URLS (available after starting):
#   - MP3 128k: http://YOUR_IP:PORT/autodj-128.mp3
#   - MP3 192k: http://YOUR_IP:PORT/autodj-192.mp3
#   - OGG:      http://YOUR_IP:PORT/autodj.ogg
#   - AAC:      http://YOUR_IP:PORT/autodj.aac
#   - And 7 more formats!
#
# WEB INTERFACE:
#   - Control Panel: http://YOUR_IP:PORT/
#   - Admin Panel:   http://YOUR_IP:PORT/admin/
#   - Statistics:    http://YOUR_IP:PORT/status.xsl
#
